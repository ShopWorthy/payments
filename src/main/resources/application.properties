server.port=6000

# H2 Console — exposed for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.datasource.url=jdbc:h2:mem:paymentsdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Payment gateway configuration
gateway.api.key=sk_live_shopworthy_gateway_abc123xyz
gateway.api.secret=gateway-secret-do-not-share
gateway.endpoint=https://fake-gateway.internal/v1

# Shopworthy API callback
shopworthy.api.url=${API_URL:http://api:4000}

# Spring Boot Actuator — fully exposed
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.env.enabled=true
management.endpoint.heapdump.enabled=true
management.endpoint.shutdown.enabled=true
management.server.port=6000
